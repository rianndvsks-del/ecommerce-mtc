version: '3.8'

services:
  db:
    image: postgres:10-alpine
    environment:
      - POSTGRES_DB=simplestore
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  web:
    build: .
    # Comando corrigido para rodar o 'dev' do seu package.json
    command: bash -c "yarn install && yarn run dev && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/simplestore
      - DEBUG=True
      - SECRET_KEY=chave-secreta-de-teste-123
      - DJANGO_SETTINGS_MODULE=simplestore.settings.local